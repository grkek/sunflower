<Application applicationId="com.tilo.desktop">
  <StyleSheet src="styles/index.css"/>
  <Script src="scripts/index.js"/>

  <Window title="Sunflower" width="800" height="600">
    <Box orientation="vertical" expand="true">

      <Box orientation="vertical" horizontalAlignment="center">
        <Label className="app-title">Sunflower</Label>
        <Label className="app-subtitle">Sign in to continue</Label>
      </Box>

      <HorizontalSeparator className="divider" />

      <Box orientation="vertical" expand="true" horizontalAlignment="center" className="form-wrapper">
        <Label className="field-label">Username</Label>
        <Entry id="usernameEntry" className="field-input" />

        <Label className="field-label">Password</Label>
        <Entry id="passwordEntry" className="field-input" isVisible="false" />

        <Button id="joinButton" className="primary-button">Sign In</Button>

        <HorizontalSeparator className="divider-thin" />

        <Button id="registerButton" className="secondary-button">Create Account</Button>
      </Box>

      <Box orientation="vertical" horizontalAlignment="center" className="footer">
        <Label className="footer-text">By continuing, you agree to our Terms of Service</Label>
      </Box>

    </Box>
  </Window>
</Application>
