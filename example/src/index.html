<Application applicationId="com.tilo.desktop">
  <StyleSheet src="styles/index.css" />
  <Script src="scripts/index.js" />
  <Window title="Sunflower" width="800" height="600">
    <Box orientation="vertical" expand="true">

      <Box orientation="vertical" horizontalAlignment="center">
        <Label id="pageTitle" className="app-title">Sunflower</Label>
        <Label id="pageSubtitle" className="app-subtitle">Sign in to continue</Label>
      </Box>

      <HorizontalSeparator className="divider" />

      <!-- Login Page (no expand) -->
      <Box id="loginPage" orientation="vertical" horizontalAlignment="center" className="form-wrapper">
        <Label className="field-label">Username</Label>
        <Entry id="loginUsername" className="field-input" />

        <Label className="field-label">Password</Label>
        <Entry id="loginPassword" className="field-input" isPassword="true" />

        <Button id="signInButton" className="primary-button">Sign In</Button>

        <HorizontalSeparator className="divider-thin" />

        <Button id="goToRegister" className="secondary-button">Create Account</Button>
      </Box>

      <!-- Register Page (no expand) -->
      <Box id="registerPage" orientation="vertical" horizontalAlignment="center" className="form-wrapper" isVisible="false">
        <Label className="field-label">Username</Label>
        <Entry id="registerUsername" className="field-input" />

        <Label className="field-label">E-Mail</Label>
        <Entry id="registerEmail" className="field-input" />

        <Label className="field-label">Password</Label>
        <Entry id="registerPassword" className="field-input" isPassword="true" />

        <Label className="field-label">Confirm Password</Label>
        <Entry id="registerConfirm" className="field-input" isPassword="true" />

        <Button id="createAccountButton" className="primary-button">Create Account</Button>

        <HorizontalSeparator className="divider-thin" />

        <Button id="goToLogin" className="secondary-button">Back to Sign In</Button>
      </Box>

      <!-- Spacer pushes footer to bottom -->
      <Box expand="true">
      </Box>

      <Box orientation="vertical" horizontalAlignment="center" className="footer">
        <Label id="termsLabel" className="footer-text">By continuing, you agree to our Terms of Service</Label>
      </Box>

    </Box>
  </Window>
</Application>
